<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#0f0f0f"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1920" height="80" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  
  <!-- Header Content -->
  <rect x="40" y="20" width="40" height="40" rx="8" fill="#3b82f6"/>
  <text x="60" y="45" fill="white" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">VK</text>
  
  <!-- Back Button -->
  <rect x="120" y="25" width="120" height="30" rx="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="180" y="43" fill="white" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">← Back to Tasks</text>
  
  <!-- Project Title -->
  <text x="280" y="35" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Project Manager</text>
  <text x="280" y="55" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">E-commerce Platform</text>
  <rect x="450" y="42" width="80" height="16" rx="8" fill="#1f2937"/>
  <text x="490" y="52" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">feature/auth</text>
  
  <!-- Header Actions -->
  <rect x="1740" y="25" width="30" height="30" rx="6" fill="#374151"/>
  <text x="1755" y="43" fill="white" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">📁</text>
  <rect x="1780" y="25" width="30" height="30" rx="6" fill="#374151"/>
  <text x="1795" y="43" fill="white" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">➕</text>
  
  <!-- Main Content Area -->
  <rect x="0" y="80" width="1920" height="1000" fill="#0f0f0f"/>
  
  <!-- Chat Messages Container -->
  <rect x="200" y="120" width="1520" height="780" fill="transparent"/>
  
  <!-- Message 1 - Assistant Welcome -->
  <circle cx="230" cy="160" r="8" fill="#10b981"/>
  <text x="250" y="155" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Project Manager</text>
  <text x="250" y="168" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">2:34 PM</text>
  
  <rect x="250" y="180" width="1200" height="120" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="270" y="210" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Hello! I'm your project manager agent. I can help you:</text>
  <text x="270" y="235" fill="#d1d5db" font-family="Arial, sans-serif" font-size="12">• Task Management: Create, organize, and track tasks</text>
  <text x="270" y="250" fill="#d1d5db" font-family="Arial, sans-serif" font-size="12">• PRD Analysis: Review and discuss project requirements</text>
  <text x="270" y="265" fill="#d1d5db" font-family="Arial, sans-serif" font-size="12">• Worker Coordination: Manage and assign work to different agents</text>
  <text x="270" y="280" fill="#d1d5db" font-family="Arial, sans-serif" font-size="12">What would you like to work on today?</text>
  
  <!-- Message 2 - User Input -->
  <circle cx="1690" cy="340" r="8" fill="#3b82f6"/>
  <text x="1670" y="335" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="end">You</text>
  <text x="1670" y="348" fill="#6b7280" font-family="Arial, sans-serif" font-size="10" text-anchor="end">2:35 PM</text>
  
  <rect x="470" y="360" width="1200" height="40" rx="12" fill="#1e40af" stroke="#3b82f6" stroke-width="1"/>
  <text x="490" y="380" fill="white" font-family="Arial, sans-serif" font-size="12">Create tasks for implementing user authentication</text>
  
  <!-- Message 3 - Assistant Response -->
  <circle cx="230" cy="440" r="8" fill="#10b981"/>
  <text x="250" y="435" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Project Manager</text>
  <text x="250" y="448" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">2:35 PM</text>
  
  <rect x="250" y="460" width="1200" height="200" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="270" y="485" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">I'll break down user authentication into specific tasks:</text>
  
  <text x="270" y="515" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Suggested Tasks:</text>
  <text x="270" y="535" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1. Backend Authentication API</text>
  <text x="290" y="550" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">• JWT token generation and validation</text>
  <text x="290" y="565" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">• User login/logout endpoints</text>
  
  <text x="270" y="585" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2. Frontend Auth Components</text>
  <text x="290" y="600" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">• Login/signup forms</text>
  <text x="290" y="615" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">• Protected route guards</text>
  
  <text x="270" y="640" fill="#d1d5db" font-family="Arial, sans-serif" font-size="12">Would you like me to create these tasks in your project board?</text>
  
  <!-- Typing Indicator -->
  <circle cx="230" cy="700" r="8" fill="#10b981"/>
  <text x="250" y="695" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Project Manager</text>
  <text x="250" y="708" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">typing...</text>
  
  <rect x="250" y="720" width="100" height="30" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <circle cx="270" cy="735" r="3" fill="#6b7280">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="285" cy="735" r="3" fill="#6b7280">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="300" cy="735" r="3" fill="#6b7280">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  
  <!-- Input Section -->
  <rect x="0" y="900" width="1920" height="180" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  
  <!-- Input Container -->
  <rect x="200" y="940" width="1520" height="100" fill="transparent"/>
  
  <!-- Input Field -->
  <rect x="240" y="960" width="1350" height="60" rx="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="260" y="980" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">Describe what you'd like to accomplish... Type @ to search files.</text>
  
  <!-- Send Button -->
  <rect x="1610" y="970" width="80" height="40" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <text x="1650" y="993" fill="white" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Send</text>
  
  <!-- Helper Text -->
  <text x="240" y="1040" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">Press Cmd/Ctrl + Enter to send. Use @ to reference files in your project.</text>
  
  <!-- Feature Callouts -->
  <!-- Callout 1: Real-time Chat -->
  <circle cx="1600" cy="200" r="6" fill="#ef4444"/>
  <line x1="1600" y1="200" x2="1750" y2="100" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="1750" y="80" width="150" height="40" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="1"/>
  <text x="1825" y="95" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Real-time Chat</text>
  <text x="1825" y="108" fill="#d1d5db" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Session Persistence</text>
  
  <!-- Callout 2: AI Intelligence -->
  <circle cx="800" cy="550" r="6" fill="#10b981"/>
  <line x1="800" y1="550" x2="950" y2="450" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="950" y="430" width="150" height="40" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
  <text x="1025" y="445" fill="#10b981" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">AI Intelligence</text>
  <text x="1025" y="458" fill="#d1d5db" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Context-Aware Responses</text>
  
  <!-- Callout 3: File Search -->
  <circle cx="600" cy="990" r="6" fill="#f59e0b"/>
  <line x1="600" y1="990" x2="400" y2="890" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="320" y="870" width="160" height="40" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="885" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">File Search Integration</text>
  <text x="400" y="898" fill="#d1d5db" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">@ Syntax Support</text>
  
  <!-- Navigation Integration Indicator -->
  <rect x="40" y="120" width="120" height="40" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="100" y="135" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Navigation</text>
  <text x="100" y="148" fill="#9ca3af" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Seamless Integration</text>
  
  <!-- Project Manager Badge -->
  <rect x="1620" y="40" width="120" height="20" rx="10" fill="#3b82f6"/>
  <text x="1680" y="52" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">PROJECT MANAGER</text>
</svg>