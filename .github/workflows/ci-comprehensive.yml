name: Comprehensive CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22
  PNPM_VERSION: 10.8.1
  RUST_TOOLCHAIN: 1.89.0

jobs:
  # Security pre-flight checks
  security-preflight:
    name: 🔒 Security Pre-flight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Secret Detection with GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Frontend quality checks
  frontend-quality:
    name: 🎨 Frontend Quality
    runs-on: buildjet-4vcpu-ubuntu-2204
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type checking
        run: cd frontend && npx tsc --noEmit

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Prettier format check
        run: cd frontend && npm run format:check

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Bundle size analysis
        run: |
          cd frontend
          npx vite-bundle-analyzer dist/stats.json --mode json > bundle-analysis.json
        continue-on-error: true

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-analysis
          path: frontend/bundle-analysis.json

  # Frontend testing
  frontend-test:
    name: 🧪 Frontend Tests
    runs-on: buildjet-4vcpu-ubuntu-2204
    needs: [frontend-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: cd frontend && npm run test --if-present -- --coverage --watchAll=false

      - name: Run integration tests
        run: cd frontend && npm run test:integration --if-present
        continue-on-error: true

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Accessibility testing
  accessibility-test:
    name: ♿ Accessibility Tests
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run accessibility tests
        run: cd frontend && npm run test:a11y --if-present
        continue-on-error: true

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './frontend/.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  # Backend Rust quality checks
  backend-quality:
    name: 🦀 Backend Quality
    runs-on: buildjet-4vcpu-ubuntu-2204
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Override repo Rust toolchain
        run: rustup override set ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend"
          cache-provider: "buildjet"
          cache-on-failure: true
          shared-key: "rust-quality"

      - name: Check Rust formatting
        run: cd backend && cargo fmt --all -- --check

      - name: Run Clippy
        run: cd backend && cargo clippy --all --all-targets --all-features -- -D warnings

      - name: Check for unused dependencies
        run: |
          cd backend
          cargo install cargo-machete --locked
          cargo machete

      - name: Generate types check
        run: npm run generate-types:check

  # Backend security and audit
  backend-security:
    name: 🔐 Backend Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Override repo Rust toolchain
        run: rustup override set ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend"

      - name: Security audit
        run: |
          cd backend
          cargo generate-lockfile --manifest-path Cargo.toml
          cargo install cargo-audit --locked
          cargo audit --file "$GITHUB_WORKSPACE/Cargo.lock" --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2021-0141 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2026-0008

      - name: Vulnerability check
        run: |
          cd backend
          cargo install cargo-deny --locked
          cargo deny check

  # Backend testing
  backend-test:
    name: 🧪 Backend Tests
    runs-on: buildjet-4vcpu-ubuntu-2204
    needs: [backend-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend"
          cache-provider: "buildjet"
          cache-on-failure: true
          shared-key: "rust-test"

      - name: Run tests with coverage
        run: |
          cd backend
          cargo install cargo-tarpaulin --locked
          cargo tarpaulin --out xml --output-dir ./coverage

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage/cobertura.xml
          flags: backend
          name: backend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Integration testing
  integration-test:
    name: 🔄 Integration Tests
    runs-on: buildjet-4vcpu-ubuntu-2204
    needs: [frontend-quality, backend-quality]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend"
          cache-provider: "buildjet"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: npm run backend:build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run integration tests
        run: npm run test:integration --if-present
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

  # Performance benchmarking
  performance-test:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: npm run build

      - name: Run performance benchmarks
        run: |
          cd backend
          cargo install cargo-criterion --locked
          cargo criterion --message-format=json > benchmark-results.json
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: backend/benchmark-results.json

  # Multi-platform build
  build-matrix:
    name: 🏗️ Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [frontend-test, backend-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend"
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build backend
        run: |
          cd backend
          cargo build --release --target ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-kanban-${{ matrix.target }}
          path: |
            backend/target/${{ matrix.target }}/release/vibe-kanban*
            frontend/dist/
          retention-days: 7

  # Container build and scan
  container-security:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    needs: [build-matrix]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibe-kanban-x86_64-unknown-linux-gnu
          path: ./artifacts

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          tags: vibe-kanban:${{ github.sha }}
          outputs: type=docker,dest=/tmp/vibe-kanban.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/vibe-kanban.tar
          format: 'sarif'
          output: 'container-scan-results.sarif'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'container-scan-results.sarif'

  # Deployment readiness check
  deployment-readiness:
    name: 🚀 Deployment Readiness
    runs-on: ubuntu-latest
    needs: [security-preflight, frontend-test, backend-test, integration-test, container-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Create deployment report
        run: |
          cat > deployment-report.md << 'EOF'
          # 🚀 Deployment Report
          
          ## Build Information
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}
          - **Trigger**: ${{ github.event_name }}
          - **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ## Quality Gates Status
          - ✅ Security scan passed
          - ✅ Frontend tests passed
          - ✅ Backend tests passed
          - ✅ Integration tests passed
          - ✅ Container security scan passed
          
          ## Artifacts Generated
          - Multi-platform binaries
          - Container image
          - SBOM (Software Bill of Materials)
          
          **Ready for deployment** ✅
          EOF

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md

  # Notification and reporting
  notification:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [deployment-readiness]
    if: always()
    steps:
      - name: Report status
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "✅ Non-push events skip deployment readiness gate"
            exit 0
          fi

          if [[ "${{ needs.deployment-readiness.result }}" == "success" ]]; then
            echo "✅ All quality gates passed - Ready for deployment"
          else
            echo "❌ Quality gates failed - Check the logs"
            exit 1
          fi
