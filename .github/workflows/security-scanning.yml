name: Security Scanning & Compliance

on:
  schedule:
    # Run daily security scans at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.8.1
  RUST_TOOLCHAIN: 1.89.0

jobs:
  # Comprehensive vulnerability scanning
  vulnerability-scan:
    name: 🔍 Vulnerability Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Override repo Rust toolchain
        run: rustup override set ${{ env.RUST_TOOLCHAIN }}

      # Frontend vulnerability scanning
      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Frontend audit (npm)
        run: |
          cd frontend
          pnpm audit --audit-level moderate || true
          pnpm audit --json > ../frontend-audit.json || true

      - name: Frontend security scan (Snyk)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --json-file-output=frontend-snyk.json
          command: test
          json: true

      # Backend vulnerability scanning
      - name: Backend audit (Cargo)
        run: |
          cd backend
          cargo install cargo-audit --locked
          cargo audit --json > ../backend-audit.json || true

      - name: Backend dependency check
        run: |
          cd backend
          cargo install cargo-deny --locked
          cargo deny --log-level error check || true

      # Container security scanning
      - name: Build temp container for scanning
        run: |
          docker build -t temp-scan:latest .

      - name: Container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'temp-scan:latest'
          format: 'sarif'
          output: 'container-vulnerabilities.sarif'

      # License compliance check
      - name: Frontend license check
        run: |
          cd frontend
          npx license-checker --json > ../frontend-licenses.json

      - name: Backend license check
        run: |
          cd backend
          cargo install cargo-license --locked
          cargo license --json > ../backend-licenses.json

      # Upload all scan results
      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-reports
          path: |
            frontend-audit.json
            frontend-snyk.json
            frontend-licenses.json
            backend-audit.json
            backend-licenses.json
            container-vulnerabilities.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'container-vulnerabilities.sarif'

  # SAST (Static Application Security Testing)
  sast-analysis:
    name: 🔒 SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, rust
          queries: security-extended,security-and-quality

      - name: Setup Node for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Override repo Rust toolchain
        run: rustup override set ${{ env.RUST_TOOLCHAIN }}

      - name: Build frontend for analysis
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build backend for analysis
        run: |
          cd backend
          cargo build --release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:multi"

  # Secret scanning
  secret-detection:
    name: 🔐 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # Software Bill of Materials (SBOM)
  sbom-generation:
    name: 📋 SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Generate frontend SBOM
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file ../frontend-sbom.json

      - name: Generate backend SBOM
        run: |
          cd backend
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --override-filename backend-sbom
          mv backend-sbom.json ../backend-sbom.json

      - name: Generate project SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: project-sbom.spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            frontend-sbom.json
            backend-sbom.json
            project-sbom.spdx.json

  # Compliance reporting
  compliance-report:
    name: 📊 Compliance Report
    runs-on: ubuntu-latest
    needs: [vulnerability-scan, sast-analysis, secret-detection, sbom-generation]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download security artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-reports"
          merge-multiple: true

      - name: Generate compliance report
        run: |
          cat > compliance-report.md << 'EOF'
          # 🛡️ Security Compliance Report
          
          **Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          
          ## Security Scan Results
          
          ### Vulnerability Scanning
          - ✅ Frontend dependency audit completed
          - ✅ Backend dependency audit completed
          - ✅ Container vulnerability scan completed
          - ✅ License compliance check completed
          
          ### Static Analysis
          - ✅ SAST analysis completed
          - ✅ CodeQL security queries executed
          
          ### Secret Detection
          - ✅ GitLeaks scan completed
          - ✅ TruffleHog scan completed
          
          ### Software Bill of Materials
          - ✅ Frontend SBOM generated
          - ✅ Backend SBOM generated
          - ✅ Project SBOM generated
          
          ## Compliance Status
          
          | Check | Status | Details |
          |-------|--------|---------|
          | Vulnerability Scan | ${{ needs.vulnerability-scan.result == 'success' && '✅ Pass' || '❌ Fail' }} | Dependency vulnerabilities checked |
          | SAST Analysis | ${{ needs.sast-analysis.result == 'success' && '✅ Pass' || '❌ Fail' }} | Static code analysis completed |
          | Secret Detection | ${{ needs.secret-detection.result == 'success' && '✅ Pass' || '❌ Fail' }} | No secrets detected in code |
          | SBOM Generation | ${{ needs.sbom-generation.result == 'success' && '✅ Pass' || '❌ Fail' }} | Software bill of materials created |
          
          ## Recommendations
          
          1. **Regular Updates**: Keep dependencies updated to latest secure versions
          2. **Monitor Alerts**: Review security alerts from GitHub Advanced Security
          3. **SBOM Tracking**: Maintain SBOM for supply chain security
          4. **Secret Management**: Use proper secret management tools
          
          ## Next Actions
          
          - [ ] Review any identified vulnerabilities
          - [ ] Update vulnerable dependencies
          - [ ] Address any SAST findings
          - [ ] Verify no secrets are committed
          
          ---
          *This report is generated automatically by the Security Scanning & Compliance workflow.*
          EOF

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.md

      - name: Comment compliance status on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('compliance-report.md', 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🛡️ Security Compliance Report\n\n${report}`
            });

  # Security advisory check
  security-advisory:
    name: 🚨 Security Advisory Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GitHub Security Advisories
        uses: actions/github-script@v7
        with:
          script: |
            const advisories = await github.rest.securityAdvisories.listGlobalAdvisories({
              ecosystem: 'npm',
              per_page: 10,
              sort: 'published',
              direction: 'desc'
            });
            
            console.log('Recent security advisories:');
            advisories.data.forEach(advisory => {
              console.log(`- ${advisory.summary} (${advisory.severity})`);
            });

      - name: Create security issue if needed
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            // Check for any high/critical findings and create issues
            // This is a placeholder for more sophisticated logic
            console.log('Security monitoring completed');

  # Cleanup old security reports
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Clean up old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);
              if (createdAt < thirtyDaysAgo && artifact.name.includes('security')) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted old security artifact: ${artifact.name}`);
              }
            }
