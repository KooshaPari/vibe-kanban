name: Production Deployment Pipeline

on:
  push:
    tags: ['v*']
  workflow_run:
    workflows: ["Comprehensive CI/CD Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      force_deploy:
        description: 'Force deployment (skip some safety checks)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Pre-deployment security validation
  security-validation:
    name: 🔒 Security Validation
    runs-on: ubuntu-latest
    outputs:
      security-status: ${{ steps.security-check.outputs.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Final security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'final-security-scan.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Security assessment
        id: security-check
        run: |
          # Check if any critical vulnerabilities found
          if [[ -f "final-security-scan.json" ]]; then
            CRITICAL_COUNT=$(jq '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL") | .VulnerabilityID' final-security-scan.json | wc -l)
            HIGH_COUNT=$(jq '.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH") | .VulnerabilityID' final-security-scan.json | wc -l)
            
            echo "Critical vulnerabilities: $CRITICAL_COUNT"
            echo "High vulnerabilities: $HIGH_COUNT"
            
            if [[ $CRITICAL_COUNT -gt 0 ]]; then
              echo "status=blocked" >> $GITHUB_OUTPUT
              echo "❌ CRITICAL vulnerabilities found - deployment blocked"
              exit 1
            elif [[ $HIGH_COUNT -gt 5 ]]; then
              echo "status=review-required" >> $GITHUB_OUTPUT
              echo "⚠️ Multiple HIGH vulnerabilities found - manual review required"
            else
              echo "status=approved" >> $GITHUB_OUTPUT
              echo "✅ Security validation passed"
            fi
          else
            echo "status=approved" >> $GITHUB_OUTPUT
          fi

  # Build and push container image
  build-and-push:
    name: 🏗️ Build & Push Container
    runs-on: buildjet-4vcpu-ubuntu-2204
    needs: [security-validation]
    if: needs.security-validation.outputs.security-status != 'blocked'
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-url: ${{ steps.build.outputs.image-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-05-18

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend"
          cache-provider: "buildjet"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            type=digest

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: container-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: container-sbom
          path: container-sbom.spdx.json

  # Container security scanning
  container-scan:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Scan container image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-url }}
          format: 'sarif'
          output: 'container-scan.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'container-scan.sarif'

  # Staging deployment
  deploy-staging:
    name: 🎭 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [container-scan]
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Deploy to staging
        id: deploy
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment logic here
          echo "url=https://staging.vibe-kanban.example.com" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        run: |
          echo "Running staging smoke tests..."
          # Add staging smoke tests here
          curl -f ${{ steps.deploy.outputs.url }}/health || exit 1

  # Production deployment approval
  production-approval:
    name: 📋 Production Approval
    runs-on: ubuntu-latest
    needs: [deploy-staging, security-validation]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event.inputs.environment == 'production'
    environment:
      name: production-approval
    steps:
      - name: Create approval issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Production Deployment Approval Required - ${context.sha.substring(0, 7)}`,
              body: `
              ## Production Deployment Request
              
              **Commit**: \`${context.sha}\`
              **Triggered by**: ${context.actor}
              **Security Status**: ${{ needs.security-validation.outputs.security-status }}
              **Staging URL**: Available for testing
              
              ## Pre-deployment Checklist
              
              - [ ] Staging tests passed
              - [ ] Security scan reviewed
              - [ ] Database migration plan confirmed
              - [ ] Rollback plan documented
              - [ ] Monitoring dashboards ready
              - [ ] On-call team notified
              
              ## Approval Required
              
              This deployment requires approval from at least **2 maintainers**.
              
              Please review the staging deployment and approve this issue to proceed with production deployment.
              `,
              labels: ['deployment', 'production', 'approval-required']
            });
            
            console.log(\`Created approval issue: #\${issue.number}\`);

  # Production deployment
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [production-approval, build-and-push]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event.inputs.environment == 'production'
    steps:
      - name: Final security check
        run: |
          echo "Performing final security check..."
          # Block deployment for critical vulnerabilities unless force_deploy is true
          if [[ "${{ needs.security-validation.outputs.security-status }}" == "blocked" && "${{ github.event.inputs.force_deploy }}" != "true" ]]; then
            echo "❌ Deployment blocked due to critical security vulnerabilities"
            exit 1
          fi

      - name: Blue-Green Deployment
        id: deploy
        run: |
          echo "Starting blue-green deployment to production..."
          
          # Deployment logic would go here
          # This is a placeholder for actual deployment commands
          
          echo "✅ Blue-green deployment completed"
          echo "url=https://vibe-kanban.example.com" >> $GITHUB_OUTPUT

      - name: Health checks
        run: |
          echo "Running production health checks..."
          URL="${{ steps.deploy.outputs.url }}"
          
          # Wait for deployment to be ready
          for i in {1..10}; do
            if curl -f "$URL/health"; then
              echo "✅ Health check $i/10 passed"
              break
            else
              echo "⏳ Health check $i/10 failed, retrying in 10s..."
              sleep 10
            fi
            
            if [[ $i -eq 10 ]]; then
              echo "❌ Health checks failed - initiating rollback"
              exit 1
            fi
          done

      - name: Production smoke tests
        run: |
          echo "Running production smoke tests..."
          URL="${{ steps.deploy.outputs.url }}"
          
          # Basic API tests
          curl -f "$URL/api/health" || exit 1
          curl -f "$URL/api/config" || exit 1
          
          echo "✅ Production smoke tests passed"

      - name: Performance validation
        run: |
          echo "Running performance validation..."
          # Add performance tests here
          # Example: k6, artillery, or similar load testing tools
          echo "✅ Performance validation completed"

  # Post-deployment monitoring
  post-deployment:
    name: 📊 Post-deployment Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'
    steps:
      - name: Setup monitoring alerts
        run: |
          echo "Setting up enhanced monitoring for new deployment..."
          # Configure monitoring dashboards and alerts

      - name: Generate deployment report
        run: |
          cat > deployment-report.md << 'EOF'
          # 🚀 Production Deployment Report
          
          ## Deployment Details
          - **Version**: ${{ github.ref_name }}
          - **Commit**: ${{ github.sha }}
          - **Deployed by**: ${{ github.actor }}
          - **Deployment time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Environment**: Production
          
          ## Security Compliance
          - ✅ Security scan passed
          - ✅ Container vulnerability scan completed
          - ✅ SBOM generated and stored
          
          ## Deployment Process
          - ✅ Blue-green deployment completed
          - ✅ Health checks passed (10/10)
          - ✅ Smoke tests passed
          - ✅ Performance validation completed
          
          ## Monitoring
          - 📊 Enhanced monitoring enabled
          - 🔔 Alerts configured
          - 📈 Dashboards updated
          
          **Deployment Status**: SUCCESS ✅
          **Production URL**: ${{ needs.deploy-production.outputs.url }}
          EOF

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-report
          path: deployment-report.md

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tagName = context.ref.replace('refs/tags/', '');
            
            // Read deployment report
            const reportContent = fs.readFileSync('deployment-report.md', 'utf8');
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Release ${tagName}`,
              body: reportContent,
              draft: false,
              prerelease: tagName.includes('beta') || tagName.includes('alpha')
            });

  # Rollback preparation
  prepare-rollback:
    name: 🔄 Prepare Rollback
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Store rollback information
        run: |
          cat > rollback-info.json << 'EOF'
          {
            "previous_version": "${{ github.sha }}",
            "deployment_time": "$(date -u +"%Y-%m-%d %H:%M:%S UTC")",
            "rollback_ready": true,
            "rollback_command": "Documented in runbook"
          }
          EOF

      - name: Upload rollback info
        uses: actions/upload-artifact@v4
        with:
          name: rollback-information
          path: rollback-info.json

  # Notifications
  notify:
    name: 📢 Deployment Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production, post-deployment]
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "🚀 Production deployment successful!"
            echo "Version: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "URL: ${{ needs.deploy-production.outputs.url }}"
          else
            echo "❌ Production deployment failed!"
            echo "Check the logs for details and initiate rollback if necessary."
          fi

      # Add Slack/Teams/Email notifications here
      # - name: Slack notification
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: ${{ job.status }}
      #     webhook_url: ${{ secrets.SLACK_WEBHOOK }}